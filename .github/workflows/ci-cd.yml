name: CI/CD

on:
  pull_request:
    branches:
      - staging
      - live
  push:
    branches:
      - staging
      - live

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t calculator-app:${{ github.sha }} .

  deploy-staging:
    name: Deploy staging to Netlify
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Netlify staging
        uses: nwtgck/actions-netlify@v3.0.0
        with:
          publish-dir: ./src
          production-deploy: false
          deploy-message: "Staging deploy from ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

  deploy-live:
    name: Deploy live to Netlify
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/live'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Netlify production
        uses: nwtgck/actions-netlify@v3.0.0
        with:
          publish-dir: ./src
          production-deploy: true
          deploy-message: "Production deploy from ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: nfp_GLkFzve8Umr37ats32wYERSB9asfwjdYa5f7
          NETLIFY_SITE_ID: 836a0ccb-b8bb-46b9-9003-fce0c59b4ba0
